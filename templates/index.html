<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Mehedi Pro Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen p-4">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center py-6">
            <h1 class="text-3xl font-black italic text-blue-600">PRO DL v2.0</h1>
            <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 bg-slate-200 dark:bg-slate-800 rounded-full">🌓</button>
        </header>

        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-xl">
            <div class="flex gap-3 mb-4">
                <input type="text" id="url" placeholder="YouTube, TikTok, Instagram URL..." class="flex-1 p-4 rounded-xl bg-slate-100 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="navigator.clipboard.readText().then(t => document.getElementById('url').value = t)" class="px-4 bg-slate-200 dark:bg-slate-700 rounded-xl">Paste</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <select id="format" class="p-3 rounded-xl bg-slate-100 dark:bg-slate-800">
                    <option value="mp4">Video (MP4)</option>
                    <option value="mp3">Audio (MP3 320k)</option>
                </select>
                <input type="number" id="limit" placeholder="Speed Limit (MB)" class="p-3 rounded-xl bg-slate-100 dark:bg-slate-800">
                <button onclick="startDL()" id="dlBtn" class="md:col-span-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">Start Download</button>
            </div>
        </div>

        <div class="mt-8 bg-black rounded-2xl overflow-hidden shadow-2xl border border-slate-800">
            <div class="flex justify-between items-center px-4 py-2 bg-slate-900 text-xs text-slate-400 font-mono">
                <span>TERMINAL_OUTPUT</span>
                <span id="stats">Ready</span>
            </div>
            <div id="terminal" class="p-4 h-64 overflow-y-auto font-mono text-sm text-blue-400 leading-relaxed">
                > Welcome, Mehedi Hasan Shanto. System initialized...
            </div>
            <div class="h-2 bg-slate-800">
                <div id="progress" class="h-full bg-blue-500 transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>
    <script src="/static/js/main.js"></script>
</body>
</html>
